<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0300">
<title>राधा</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanabari:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;
-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}

html,body{width:100%;height:100%;overflow:hidden;
background:radial-gradient(ellipse at 50% 40%,#1C0500 0%,#0A0300 75%);
font-family:'Tiro Devanabari','Noto Sans Devanagari','Mangal',serif}

/* ── SCREENS ── */
.scr{position:fixed;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center;
opacity:0;pointer-events:none;transition:opacity 1.3s ease}
.scr.on{opacity:1;pointer-events:all}

/* ── START ── */
#ss{gap:52px}
#s-radhe{font-size:clamp(1.8rem,8vw,2.6rem);
color:rgba(204,34,0,.5);letter-spacing:.28em;
animation:breathe 5s ease-in-out infinite}
.mrow{display:flex;gap:14px}
.mb{padding:11px 22px;border:1px solid rgba(204,34,0,.22);
border-radius:100px;background:transparent;
color:rgba(255,110,60,.65);font-family:inherit;
font-size:.92rem;cursor:pointer;
transition:all .3s;touch-action:manipulation}
.mb.sel{background:rgba(204,34,0,.16);
border-color:rgba(204,34,0,.65);color:#FF7744}
#s-hint{font-size:.75rem;color:rgba(204,34,0,.25);
letter-spacing:.38em;animation:flicker 2.4s ease-in-out infinite}

/* ── JAP ── */
#js{touch-action:none}

#naam{font-size:clamp(100px,30vw,170px);line-height:1;
display:flex;color:#BB1E00;
filter:drop-shadow(0 0 22px rgba(187,30,0,.25));
animation:breathe 5s ease-in-out infinite;
transition:color .45s ease,filter .45s ease}
#naam.flash{color:#FF5522;
filter:drop-shadow(0 0 38px rgba(255,85,34,.55))}
#naam.gold{color:#FFD000;
filter:drop-shadow(0 0 44px rgba(255,210,0,.6))
drop-shadow(0 0 88px rgba(255,180,0,.28))}

.sy{display:inline-block;
transition:transform 2.2s cubic-bezier(.2,1,.3,1),opacity 2.2s ease}
#naam.drift .sy:first-child{transform:translateX(-26px);opacity:.3}
#naam.drift .sy:last-child {transform:translateX(26px); opacity:.3}
#naam.unite .sy{transform:translateX(0);opacity:1}

/* count */
#cnt{position:fixed;bottom:17%;width:100%;text-align:center;
font-size:clamp(1.8rem,7vw,2.5rem);
color:rgba(255,190,130,.78);letter-spacing:.07em;
opacity:0;transition:opacity .38s ease;pointer-events:none}
#cnt.on{opacity:1}

#mline{position:fixed;bottom:11.5%;width:100%;text-align:center;
font-size:.8rem;color:rgba(255,145,75,.35);letter-spacing:.22em;
opacity:0;transition:opacity .38s ease;pointer-events:none}
#mline.on{opacity:1}

/* voice dot */
#vd{position:fixed;
top:max(44px,env(safe-area-inset-top,44px));
right:26px;width:7px;height:7px;border-radius:50%;
background:rgba(204,34,0,.32);
opacity:0;transition:opacity .5s}
#vd.on{opacity:1;animation:vpulse 1.7s ease-in-out infinite}
#vd.hit{background:#FF6633;animation:vhit .3s ease forwards}
@keyframes vpulse{0%,100%{transform:scale(1);opacity:.38}
50%{transform:scale(1.8);opacity:.88}}
@keyframes vhit{0%{transform:scale(1)}50%{transform:scale(2.8)}100%{transform:scale(1)}}

/* hold ring */
#hr{position:fixed;bottom:3.5%;left:50%;
transform:translateX(-50%);
width:46px;height:46px;opacity:0;
transition:opacity .28s;pointer-events:none}
#hr svg{width:100%;height:100%}
#hc{fill:none;stroke:rgba(204,34,0,.4);stroke-width:1.8;
stroke-dasharray:127;stroke-dashoffset:127;
transform-origin:center;transform:rotate(-90deg)}

/* tap zone */
#tz{position:fixed;inset:0;z-index:20;touch-action:none}

/* ── SUMMARY ── */
#sum{gap:20px;padding:40px 32px}
#sum-r{font-size:1.35rem;color:rgba(204,34,0,.6);
letter-spacing:.3em;margin-bottom:10px}
#sum-n{font-size:clamp(3rem,14vw,5rem);color:#BB1E00}
.ss{font-size:.88rem;color:rgba(255,150,80,.5);letter-spacing:.18em}
#sum-m{margin-top:30px;font-size:.86rem;
color:rgba(255,185,120,.42);text-align:center;
line-height:2.2;letter-spacing:.1em;
opacity:0;transition:opacity 2.2s ease}
#sum-m.on{opacity:1}
#sum-d{margin-top:38px;padding:13px 38px;
border:1px solid rgba(204,34,0,.25);border-radius:100px;
background:transparent;color:rgba(255,110,60,.65);
font-family:inherit;font-size:.93rem;cursor:pointer;
opacity:0;transition:opacity 1.1s ease}
#sum-d.on{opacity:1}

/* ── LIFETIME ── */
#lt{position:fixed;inset:0;
background:rgba(10,3,0,.97);
display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:14px;
opacity:0;pointer-events:none;transition:opacity .58s ease;z-index:50}
#lt.on{opacity:1;pointer-events:all}
#lt-lb{font-size:.76rem;color:rgba(255,145,80,.42);letter-spacing:.32em}
#lt-n{font-size:clamp(3rem,13vw,4.8rem);color:#BB1E00}
#lt-m{font-size:1.05rem;color:rgba(255,145,80,.42)}
#lt-h{margin-top:38px;font-size:.68rem;
color:rgba(204,34,0,.22);letter-spacing:.32em}

/* ── PARTICLES ── */
.pt{position:fixed;border-radius:50%;
background:rgba(187,30,0,.1);pointer-events:none;
animation:rise linear infinite}
@keyframes rise{
0%{transform:translateY(102vh) translateX(0);opacity:0}
8%{opacity:1}92%{opacity:1}
100%{transform:translateY(-6vh) translateX(12px);opacity:0}}

/* ── SHARED ANIMS ── */
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes flicker{0%,100%{opacity:.25}50%{opacity:.62}}
</style>
</head>
<body>

<div id="pts"></div>

<!-- START -->
<div class="scr on" id="ss">
  <div id="s-radhe">राधे राधे</div>
  <div class="mrow">
    <button class="mb sel" id="mb-tap"   onclick="setMode('tap')">👆 जप</button>
    <button class="mb"     id="mb-voice" onclick="setMode('voice')">🎙️ वाणी</button>
    <button class="mb"     id="mb-both"  onclick="setMode('both')">दोनों</button>
  </div>
  <div id="s-hint">— स्पर्श करें —</div>
</div>

<!-- JAP -->
<div class="scr" id="js">
  <div id="naam" class="unite">
    <span class="sy">रा</span><span class="sy">धा</span>
  </div>
  <div id="cnt">0</div>
  <div id="mline">माला: 0</div>
  <div id="vd"></div>
  <div id="hr"><svg viewBox="0 0 46 46"><circle id="hc" cx="23" cy="23" r="20.2"/></svg></div>
  <div id="tz"></div>
</div>

<!-- SUMMARY -->
<div class="scr" id="sum">
  <div id="sum-r">राधे राधे</div>
  <div id="sum-n">0</div>
  <div class="ss" id="sum-ml">माला: 0</div>
  <div class="ss" id="sum-t">0 मिनट</div>
  <div id="sum-m">राधे राधे — सँभाल लिया&nbsp;🌸</div>
  <button id="sum-d" onclick="goStart()">🙏&nbsp;राधे राधे</button>
</div>

<!-- LIFETIME -->
<div id="lt">
  <div id="lt-lb">कुल राधा नाम</div>
  <div id="lt-n">0</div>
  <div id="lt-m">0 माला</div>
  <div id="lt-h">↓ स्पर्श करें</div>
</div>

<script>
/* ══ STATE ══ */
const S={mode:'tap',count:0,malas:0,t0:0,lastTap:0,
cTimer:null,idleTimer:null,raf:null,hs:0,
drifting:false,active:false,recog:null,
wl:null,swy:0,ctx:null};

/* ══ DB ══ */
const DB={
  get(){try{return JSON.parse(localStorage.getItem('r8')||'{}')}catch{return{}}},
  add(c,m){const d=this.get();
    d.life=(d.life||0)+c;d.malas=(d.malas||0)+m;
    if(!d.s)d.s=[];
    d.s.push({ts:Date.now(),c,m,mode:S.mode});
    localStorage.setItem('r8',JSON.stringify(d))}
};

/* ══ SCREENS ══ */
function show(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  requestAnimationFrame(()=>document.getElementById(id).classList.add('on'));
}

/* ══ MODE ══ */
function setMode(m){
  S.mode=m;
  ['tap','voice','both'].forEach(x=>
    document.getElementById('mb-'+x).classList.toggle('sel',x===m));
}

/* ══ START ══ */
document.getElementById('ss').addEventListener('click',e=>{
  if(e.target.closest('.mb'))return;
  begin();
});

function begin(){
  S.count=0;S.malas=0;S.t0=Date.now();S.active=true;S.drifting=false;
  upd();show('js');
  pts();wl();
  if(S.mode!=='tap')voice();
  idleReset();
}

/* ══ ADD COUNT ══ */
function add(){
  if(!S.active)return;
  const n=Date.now();
  if(n-S.lastTap<85)return;
  S.lastTap=n;
  S.count++;
  if(navigator.vibrate)navigator.vibrate(22);
  flash();
  if(S.count%108===0){S.malas++;mala();}
  if(S.drifting)unite();
  upd();showC();idleReset();
}

function upd(){
  document.getElementById('cnt').textContent=S.count.toLocaleString();
  document.getElementById('mline').textContent='माला: '+S.malas;
}

function showC(){
  clearTimeout(S.cTimer);
  document.getElementById('cnt').classList.add('on');
  document.getElementById('mline').classList.add('on');
  S.cTimer=setTimeout(()=>{
    document.getElementById('cnt').classList.remove('on');
    document.getElementById('mline').classList.remove('on');
  },2300);
}

/* ══ NAAM ANIMS ══ */
function flash(){
  const n=document.getElementById('naam');
  n.classList.remove('flash');void n.offsetWidth;
  n.classList.add('flash');
  setTimeout(()=>n.classList.remove('flash'),290);
}

function mala(){
  const n=document.getElementById('naam');
  n.classList.add('gold');bell();
  setTimeout(()=>n.classList.remove('gold'),4400);
}

function drift(){
  S.drifting=true;
  const n=document.getElementById('naam');
  n.classList.remove('unite');n.classList.add('drift');
}

function unite(){
  S.drifting=false;
  const n=document.getElementById('naam');
  n.classList.remove('drift');n.classList.add('unite');
}

function idleReset(){
  clearTimeout(S.idleTimer);
  S.idleTimer=setTimeout(drift,38000);
}

/* ══ TOUCH ══ */
const tz=document.getElementById('tz');

tz.addEventListener('touchstart',e=>{
  e.preventDefault();
  S.swy=e.touches[0].clientY;
  S.hs=Date.now();
  startHold();
},{passive:false});

tz.addEventListener('touchend',e=>{
  e.preventDefault();
  const dy=S.swy-e.changedTouches[0].clientY;
  stopHold();
  if(dy>55){showLT();return;}
  if(Date.now()-S.hs<2800)add();
},{passive:false});

tz.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
tz.addEventListener('mousedown',()=>{S.hs=Date.now();startHold();});
tz.addEventListener('mouseup',()=>{stopHold();if(Date.now()-S.hs<2800)add();});

/* ══ HOLD RING ══ */
const C=127;
const hc=document.getElementById('hc');
const hr=document.getElementById('hr');

function startHold(){
  hr.style.opacity='1';
  const s=Date.now();
  function step(){
    const p=Math.min((Date.now()-s)/3000,1);
    hc.style.strokeDashoffset=C*(1-p);
    if(p<1)S.raf=requestAnimationFrame(step);
    else end();
  }
  S.raf=requestAnimationFrame(step);
}

function stopHold(){
  if(S.raf){cancelAnimationFrame(S.raf);S.raf=null;}
  hr.style.opacity='0';
  hc.style.strokeDashoffset=C;
}

/* ══ END SESSION ══ */
function end(){
  S.active=false;
  if(S.recog){try{S.recog.stop();}catch(e){}}
  if(S.wl){try{S.wl.release();}catch(e){}}
  clearTimeout(S.idleTimer);
  const mins=Math.round((Date.now()-S.t0)/60000);
  DB.add(S.count,S.malas);
  summary(mins);
}

function summary(m){
  document.getElementById('sum-n').textContent=S.count.toLocaleString();
  document.getElementById('sum-ml').textContent='माला: '+S.malas;
  document.getElementById('sum-t').textContent=m+' मिनट';
  ['sum-m','sum-d'].forEach(id=>{
    document.getElementById(id).classList.remove('on');
  });
  show('sum');
  setTimeout(()=>document.getElementById('sum-m').classList.add('on'),3200);
  setTimeout(()=>document.getElementById('sum-d').classList.add('on'),5800);
}

function goStart(){
  show('ss');unite();
  const n=document.getElementById('naam');
  n.classList.remove('gold','flash');
}

/* ══ LIFETIME ══ */
function showLT(){
  const d=DB.get();
  document.getElementById('lt-n').textContent=(d.life||0).toLocaleString();
  document.getElementById('lt-m').textContent=(d.malas||0)+' माला';
  document.getElementById('lt').classList.add('on');
}
document.getElementById('lt').addEventListener('click',()=>
  document.getElementById('lt').classList.remove('on'));

/* ══ BELL ══ */
function bell(){
  try{
    if(!S.ctx)S.ctx=new(window.AudioContext||window.webkitAudioContext)();
    const x=S.ctx;
    [[392,.54],[784,.27],[1176,.13],[1568,.07]].forEach(([f,a])=>{
      const o=x.createOscillator(),g=x.createGain();
      o.connect(g);g.connect(x.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,x.currentTime);
      g.gain.linearRampToValueAtTime(a,x.currentTime+.012);
      g.gain.exponentialRampToValueAtTime(.0001,x.currentTime+5.8);
      o.start();o.stop(x.currentTime+5.8);
    });
  }catch(e){}
}

/* ══ VOICE ══ */
function voice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  const r=new SR();
  r.lang='hi-IN';r.continuous=true;r.interimResults=true;
  S.recog=r;
  const vd=document.getElementById('vd');
  vd.classList.add('on');
  r.onresult=ev=>{
    const t=ev.results[ev.results.length-1][0].transcript;
    if(/राधे|राधा|radhe|radha/i.test(t)){
      vd.classList.remove('hit');void vd.offsetWidth;
      vd.classList.add('hit');
      setTimeout(()=>vd.classList.remove('hit'),280);
      add();
    }
  };
  r.onend=()=>{
    if(S.active)try{r.start();}catch(e){}
    else vd.classList.remove('on','hit');
  };
  try{r.start();}catch(e){}
}

/* ══ WAKE LOCK ══ */
async function wl(){
  try{if('wakeLock'in navigator)S.wl=await navigator.wakeLock.request('screen');}
  catch(e){}
}

/* ══ PARTICLES ══ */
function pts(){
  const c=document.getElementById('pts');c.innerHTML='';
  for(let i=0;i<9;i++){
    const p=document.createElement('div');p.className='pt';
    const s=1+Math.random()*2.5;
    Object.assign(p.style,{
      width:s+'px',height:s+'px',
      left:Math.random()*100+'vw',
      animationDuration:(13+Math.random()*17)+'s',
      animationDelay:(-Math.random()*17)+'s'
    });
    c.appendChild(p);
  }
}
pts();
</script>
</body>
</html>
